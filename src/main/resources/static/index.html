<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sossego Pet | Gestão Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e5e0d8;
            --card: #ffffff;
            --sidebar: #cfc8bc;
            --brand: #000000;
            --accent: #4a3219;
            --border: #a39d91;
            --success: #0e5a29;
            --info: #0044cc;
            --warning: #f39c12;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg); color: #000;
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        nav {
            width: 110px; background: var(--sidebar); border-right: 3px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding-top: 40px;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; margin-bottom: 45px;
            cursor: pointer; opacity: 0.8; transition: 0.2s; color: var(--brand);
        }
        .nav-item.active { opacity: 1; font-weight: 900; transform: scale(1.1); }
        .nav-item i { font-size: 32px; margin-bottom: 5px; font-style: normal; }
        .nav-item span { font-size: 0.7rem; text-transform: uppercase; font-weight: 800; }

        main { flex: 1; padding: 40px 60px; overflow-y: auto; }
        .page { display: none; max-width: 1300px; margin: 0 auto; animation: fadeIn 0.2s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        section {
            background: var(--card); padding: 50px; border-radius: 12px;
            border: 3px solid var(--brand); box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        h1 { font-weight: 900; font-size: 2.8rem; margin-bottom: 40px; letter-spacing: -2px; }
        h2 { font-size: 1.3rem; text-transform: uppercase; border-bottom: 5px solid var(--bg); padding-bottom: 10px; margin-bottom: 30px; font-weight: 900; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .input-group { margin-bottom: 25px; }

        label {
            display: block; font-size: 1rem; font-weight: 900; color: var(--accent);
            text-transform: uppercase; margin-bottom: 10px;
        }

        input, select, textarea {
            width: 100%; padding: 20px; background: #fff; border: 3px solid var(--brand);
            border-radius: 8px; font-size: 1.3rem; box-sizing: border-box; font-family: inherit;
            color: #000; font-weight: 700;
        }

        .checkbox-container {
            display: flex; align-items: center; gap: 15px;
            background: #f9f9f9; padding: 20px; border: 3px dashed var(--brand);
            border-radius: 8px; cursor: pointer;
        }
        .checkbox-container input { width: 30px; height: 30px; cursor: pointer; }

        .btn-main {
            background: var(--brand); color: white; border: none; padding: 25px;
            border-radius: 8px; font-weight: 900; cursor: pointer; width: 100%;
            text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; margin-top: 10px;
        }

        /* Tabelas e Listas */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #000; text-transform: uppercase; font-weight: 900; border-bottom: 4px solid var(--brand); font-size: 0.8rem; }
        td { padding: 20px 15px; border-bottom: 2px solid var(--border); background: #fff; vertical-align: middle; }

        .row-main { font-size: 1.4rem; font-weight: 900; color: #000; }
        .row-sub { font-size: 1.1rem; color: #444; font-weight: 700; margin-top: 3px; }
        .row-time { font-size: 1.4rem; font-weight: 900; color: #000; margin-top: 3px; }
        .badge { display: inline-block; padding: 5px 12px; background: var(--brand); color: #fff; border-radius: 4px; font-size: 0.85rem; font-weight: 900; }

        /* Gestão de Clientes - Layout Ajustado */
        .cliente-bar { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 3px solid var(--brand); border-radius: 8px; padding: 25px; margin-bottom: 15px; gap: 30px; }
        .cliente-info { display: flex; gap: 40px; flex: 1; align-items: center; overflow: hidden; }
        .info-block { display: flex; flex-direction: column; }
        .info-label { font-size: 0.85rem; font-weight: 800; color: var(--border); text-transform: uppercase; margin-bottom: 4px; white-space: nowrap; }
        .info-text { font-size: 1.4rem; font-weight: 800; white-space: nowrap; }
        .info-text.end { white-space: normal; line-height: 1.2; font-size: 1.2rem; color: var(--accent); }

        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .modal-content { background: var(--bg); padding: 40px; border-radius: 15px; width: 90%; max-width: 650px; border: 4px solid var(--brand); }

        #notification {
            position: fixed; top: 20px; right: 20px; padding: 30px 60px; background: var(--brand);
            color: white; border-radius: 4px; display: none; z-index: 9999; font-weight: 900; font-size: 1.4rem; border: 4px solid white;
        }
    </style>
</head>
<body>

<div id="notification"></div>

<div id="modalEditar" class="modal">
    <div class="modal-content">
        <h1>Editar <b>Registro</b></h1>
        <input type="hidden" id="editClienteId">
        <input type="hidden" id="editPetId">
        <div class="grid">
            <div class="input-group"><label>Dono</label><input type="text" id="editNome"></div>
            <div class="input-group"><label>WhatsApp</label><input type="text" id="editTel"></div>
        </div>
        <div class="grid">
            <div class="input-group"><label>Pet</label><input type="text" id="editPetNome"></div>
            <div class="input-group"><label>Raça</label><input type="text" id="editRaca"></div>
        </div>
        <div class="input-group"><label>Endereço</label><input type="text" id="editEnd"></div>
        <div class="grid">
            <button class="btn-main" style="background: var(--success)" onclick="salvarEdicao()">Atualizar ✅</button>
            <button class="btn-main" style="background: #666" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showPage('cadastro', this)"><i>👤</i><span>Novo</span></div>
    <div class="nav-item" onclick="showPage('agendamento', this)"><i>📅</i><span>Agenda</span></div>
    <div class="nav-item" onclick="showPage('lista', this)"><i>📋</i><span>Fila</span></div>
    <div class="nav-item" onclick="showPage('clientes', this)"><i>🐶</i><span>Clientes</span></div>
</nav>

<main>
    <div id="cadastro" class="page active">
        <h1>Sossego <b>Pet</b></h1>
        <section id="sectionDono">
            <h2>1. Dados do Proprietário</h2>
            <div class="grid">
                <div class="input-group"><label>Nome</label><input type="text" id="cliNome"></div>
                <div class="input-group"><label>WhatsApp</label><input type="text" id="cliTel"></div>
            </div>
            <div class="input-group"><label>Endereço Completo</label><input type="text" id="cliEnd"></div>
            <button class="btn-main" onclick="cadastrarDono()">Próximo: Adicionar Pets 🐾</button>
        </section>
        <section id="sectionPet" style="display:none; margin-top: 30px;">
            <h2 style="color: var(--success);">2. Cadastrar Animal para <span id="spanDonoNome"></span></h2>
            <div class="grid">
                <div class="input-group"><label>Nome do Pet</label><input type="text" id="aniNome"></div>
                <div class="input-group"><label>Raça</label><input type="text" id="aniRaca"></div>
            </div>
            <div class="grid">
                <button class="btn-main" style="background: var(--success);" onclick="cadastrarPet(false)">Concluir ✅</button>
                <button class="btn-main" style="background: var(--info);" onclick="cadastrarPet(true)">Salvar e + Outro Pet</button>
            </div>
        </section>
    </div>

    <div id="agendamento" class="page">
        <h1>Novo <b>Agendamento</b></h1>
        <section>
            <div style="display:flex; gap:15px; margin-bottom:40px">
                <input type="text" id="buscaTel" placeholder="WhatsApp do cliente...">
                <button class="btn-main" style="width:280px; margin-top:0" onclick="buscarFicha()">Buscar 🔍</button>
            </div>
            <div id="fichaCliente" style="display:none; background: #fffdeb; border: 4px solid var(--brand); padding: 30px; border-radius: 8px; margin-bottom: 30px;">
                <label>Tutor(a):</label>
                <div id="resDono" style="font-size: 2rem; font-weight: 900;"></div>
                <div style="margin-top:25px">
                    <label>Selecione o Pet:</label>
                    <select id="selectPet"></select>
                </div>
            </div>
            <div id="areaServico" style="display:none">
                <div class="grid">
                    <div class="input-group"><label>Serviço</label><select id="ageServico"><option>Banho</option><option>Tosa</option><option>Banho & Tosa</option><option>Tosa Higiênica</option></select></div>
                    <div class="input-group"><label>Pagamento</label><select id="agePagamento"><option value="Pix">Pix</option><option value="Dinheiro">Dinheiro</option><option value="Cartão Débito">Cartão Débito</option><option value="Cartão Crédito">Cartão Crédito</option></select></div>
                </div>
                <div class="grid">
                    <div class="input-group"><label>Valor R$</label><input type="number" id="ageValor" step="0.01"></div>
                    <div class="input-group"><label>Data / Hora</label><input type="datetime-local" id="ageData"></div>
                </div>
                <div class="input-group" style="margin-top:10px">
                    <label class="checkbox-container">
                        <input type="checkbox" id="ageTaxa">
                        <span class="checkbox-label" style="font-weight: 900;">PRECISA BUSCAR E ENTREGAR O PET? 🚚</span>
                    </label>
                </div>
                <!-- CAMPO DE DESCRIÇÃO ADICIONADO ABAIXO -->
                <div class="input-group" style="margin-top:20px">
                    <label>Anotações / Descrição do Serviço</label>
                    <textarea id="ageDescricao" rows="3" placeholder="Ex: Alérgico a shampoo, tosa baixa..."></textarea>
                </div>
                <button class="btn-main" onclick="confirmarAgenda()">Confirmar Horário 🎋</button>
            </div>
        </section>
    </div>

    <div id="lista" class="page">
        <h1>Fila de <b>Trabalho</b></h1>
        <section style="padding: 20px;">
            <table id="tabelaFila">
                <thead>
                <tr>
                    <th>Dono / Endereço</th>
                    <th>Pet / Raça</th>
                    <th>Serviço / Pagamento</th>
                    <th>Valor / Hora</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </div>

    <div id="clientes" class="page">
        <h1>Gestão de <b>Clientes</b></h1>
        <div style="display:flex; gap:15px; margin-bottom:30px">
            <input type="text" id="buscaTelClientes" placeholder="Buscar por WhatsApp...">
            <button class="btn-main" style="width:200px; margin-top:0" onclick="filtrarClientesPorTelefone()">BUSCAR</button>
        </div>
        <div id="listaClientes"></div>
    </div>
</main>

<script>
    const API = "http://localhost:8080";
    let clienteAtualId = null;

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'lista') carregarFila();
        if(id === 'clientes') carregarClientes();
    }

    function notify(msg) {
        const n = document.getElementById('notification');
        n.innerText = msg; n.style.display = 'block';
        setTimeout(() => n.style.display = 'none', 3000);
    }

    // --- FILA (DESCRIÇÃO ADICIONADA NA RENDERIZAÇÃO) ---
    async function carregarFila() {
        const res = await fetch(`${API}/agendamentos`);
        const dados = await res.json();
        const body = document.querySelector('#tabelaFila tbody');
        body.innerHTML = "";
        dados.forEach(a => {
            const dataFmt = new Date(a.dataHora).toLocaleString('pt-BR', {hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit'});
            const entrega = a.buscarEntregar ? '<span class="badge" style="background:#d35400; margin-top:5px">🚚 BUSCAR/ENTREGAR</span>' : '';

            // Lógica para exibir descrição se houver
            const descHtml = a.descricao ? `<div style="font-size: 0.9rem; color: #666; font-style: italic; margin-top: 5px; border-left: 2px solid var(--brand); padding-left: 8px;">"${a.descricao}"</div>` : '';

            body.innerHTML += `
                <tr>
                    <td><div class="row-main">${a.pet.dono.nome}</div><div class="row-sub">📍 ${a.pet.dono.endereco}</div></td>
                    <td><div class="row-main">${a.pet.nome.toUpperCase()}</div><div class="row-sub">${a.pet.raca}</div></td>
                    <td><div class="row-main">${a.servico}</div><div class="row-sub">💰 ${a.formaPagamento}</div>${entrega}${descHtml}</td>
                    <td><div class="row-main">R$ ${a.valor.toFixed(2)}</div><div class="row-time">${dataFmt}</div></td>
                    <td><button id="btn-finalizar-${a.id}" class="btn-main" style="padding:15px; font-size:0.85rem; background:var(--success); margin-top:0" onclick="finalizar(${a.id})">FINALIZAR</button></td>
                </tr>`;
        });
    }

    async function finalizar(id) {
        const res = await fetch(`${API}/agendamentos/${id}`, { method: 'DELETE' });
        const link = await res.text();
        notify("✅ Concluído!"); carregarFila();
        setTimeout(() => { window.location.href = link; }, 1000);
    }

    // --- CLIENTES (COM BOTAO EDITAR) ---
    async function carregarClientes() {
        const res = await fetch(`${API}/animais`);
        const pets = await res.json(); renderizarClientes(pets);
    }

    async function filtrarClientesPorTelefone() {
        const tel = document.getElementById('buscaTelClientes').value;
        const res = await fetch(`${API}/clientes/buscar-por-telefone/${tel}`);

        if(!res.ok) {
            return notify("❌ Cliente não encontrado");
        }

        const c = await res.json();
        notify(`✅ Cliente ${c.nome} localizado!`);

        const resP = await fetch(`${API}/animais`);
        const pets = (await resP.json()).filter(p => p.dono.id === c.id);
        renderizarClientes(pets);
    }

    function renderizarClientes(pets) {
        const container = document.getElementById('listaClientes');
        container.innerHTML = "";
        pets.forEach(p => {
            container.innerHTML += `
                <div class="cliente-bar">
                    <div class="cliente-info">
                        <div class="info-block"><span class="info-label">Pet</span><span class="info-text" style="color:var(--success)">${p.nome}</span></div>
                        <div class="info-block"><span class="info-label">Dono</span><span class="info-text">${p.dono.nome}</span></div>
                        <div class="info-block"><span class="info-label">WhatsApp</span><span class="info-text">${p.dono.telefone}</span></div>
                        <div class="info-block" style="flex:2"><span class="info-label">📍 Endereço</span><span class="info-text end">${p.dono.endereco}</span></div>
                    </div>
                    <button class="btn-main" style="width:140px; padding:15px; font-size:0.8rem; background:var(--warning); margin-top:0" onclick="abrirEdicao(${p.id}, ${p.dono.id})">✎ EDITAR</button>
                </div>`;
        });
    }

    // --- LOGICA MODAL EDIÇÃO ---
    async function abrirEdicao(petId, donoId) {
        const resP = await fetch(`${API}/animais/${petId}`);
        const p = await resP.json();
        document.getElementById('editPetId').value = p.id;
        document.getElementById('editClienteId').value = p.dono.id;
        document.getElementById('editPetNome').value = p.nome;
        document.getElementById('editRaca').value = p.raca;
        document.getElementById('editNome').value = p.dono.nome;
        document.getElementById('editTel').value = p.dono.telefone;
        document.getElementById('editEnd').value = p.dono.endereco;
        document.getElementById('modalEditar').style.display = 'flex';
    }

    async function salvarEdicao() {
        const pId = document.getElementById('editPetId').value;
        const cId = document.getElementById('editClienteId').value;
        const cObj = { nome: document.getElementById('editNome').value, telefone: document.getElementById('editTel').value, endereco: document.getElementById('editEnd').value, formaPagamento: "PIX" };
        const pObj = { nome: document.getElementById('editPetNome').value, raca: document.getElementById('editRaca').value, clienteId: cId };
        await fetch(`${API}/clientes/${cId}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(cObj) });
        await fetch(`${API}/animais/${pId}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(pObj) });
        notify("✅ Registro Atualizado!"); fecharModal(); carregarClientes();
    }
    function fecharModal() { document.getElementById('modalEditar').style.display = 'none'; }

    // --- CADASTRO / BUSCA ---
    async function cadastrarDono() {
        const c = { nome: document.getElementById('cliNome').value, telefone: document.getElementById('cliTel').value, endereco: document.getElementById('cliEnd').value, formaPagamento: "PIX" };
        const res = await fetch(`${API}/clientes`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(c) });
        const salvo = await res.json(); clienteAtualId = salvo.id;
        document.getElementById('sectionDono').style.opacity = '0.3';
        document.getElementById('sectionPet').style.display = 'block';
        document.getElementById('spanDonoNome').innerText = salvo.nome;
    }
    async function cadastrarPet(outro) {
        const p = { nome: document.getElementById('aniNome').value, raca: document.getElementById('aniRaca').value, clienteId: clienteAtualId };
        await fetch(`${API}/animais`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(p) });
        if(!outro) location.reload(); else { document.getElementById('aniNome').value = ""; notify("🐾 Pet Adicionado!"); }
    }
    async function buscarFicha() {
        const tel = document.getElementById('buscaTel').value;
        const res = await fetch(`${API}/clientes/buscar-por-telefone/${tel}`);
        if(!res.ok) return notify("❌ Não encontrado");
        const c = await res.json();
        document.getElementById('resDono').innerText = c.nome;
        const resP = await fetch(`${API}/animais`);
        const pets = (await resP.json()).filter(p => p.dono.id === c.id);
        const s = document.getElementById('selectPet'); s.innerHTML = "";
        pets.forEach(p => s.innerHTML += `<option value="${p.id}">${p.nome.toUpperCase()}</option>`);
        document.getElementById('fichaCliente').style.display = 'block';
        document.getElementById('areaServico').style.display = 'block';
    }
    // ENVIO DE DESCRIÇÃO ADICIONADO NO POST
    async function confirmarAgenda() {
        const dto = {
            petId: document.getElementById('selectPet').value,
            servico: document.getElementById('ageServico').value,
            valor: document.getElementById('ageValor').value,
            dataHora: document.getElementById('ageData').value,
            formaPagamento: document.getElementById('agePagamento').value,
            buscarEntregar: document.getElementById('ageTaxa').checked,
            descricao: document.getElementById('ageDescricao').value // <--- CAMPO ENVIADO
        };
        await fetch(`${API}/agendamentos`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(dto) });
        showPage('lista', document.querySelectorAll('.nav-item')[2]);
    }
</script>
</body>
</html>
